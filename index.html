<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>OnderhoudPlanner</title>
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="icon" href="icon-512.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0757c8">

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button class="icon-btn" id="backBtn" hidden>←</button>
      <div>
        <p class="eyebrow">OnderhoudPlanner</p>
        <h1 id="pageTitle">Dashboard</h1>
      </div>
      <button class="icon-btn" id="notifyBtn">🔔</button>
    </header>

    <main id="app"></main>
    <button id="fabAdd" class="fab-add">+</button>

    <nav class="bottom-nav">
      <button data-route="dashboard" class="active">▦<span>Dashboard</span></button>
      <button data-route="customers">👥<span>Klanten</span></button>
      <button data-route="agenda">📅<span>Agenda</span></button>
      <button data-route="settings">⚙<span>Instellingen</span></button>
    </nav>
  </div>
  <script src="app.js"></script>
</body>
</html>
